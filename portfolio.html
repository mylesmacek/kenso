<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Kenso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-logo">
      <div class="sidebar-logo-mark">
        <svg viewBox="0 0 18 18" fill="none"><path d="M2 13 L6 7.5 L9.5 10.5 L13.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 4 L14 4 L14 7" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="sidebar-label">Kenso</span>
    </a>

    <nav class="sidebar-nav">
      <a href="budget.html" class="sidebar-link">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M5 8h6M5 11h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span class="sidebar-label">Budget</span>
      </a>

      <a href="portfolio.html" class="sidebar-link active">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 12 L5 8 L8 10 L12 4 L14 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="sidebar-label">Portfolio</span>
      </a>

      <a href="insights.html" class="sidebar-link">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span class="sidebar-label">Insights</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-footer-avatar">M</div>
      <div class="sidebar-footer-name">Myles</div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="app-main">
    <main class="app-content">

      <!-- Summary KPIs -->
      <div class="summary-grid" style="grid-template-columns:repeat(3,1fr);">
        <div class="summary-card">
          <div class="summary-card-label">Total portfolio value</div>
          <div class="summary-card-val" id="kpi-total">—</div>
          <div class="summary-card-delta" id="kpi-holdings-count">Loading…</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">Today's change</div>
          <div class="summary-card-val" id="kpi-day-change">—</div>
          <div class="summary-card-delta" id="kpi-day-pct">—</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">Total return</div>
          <div class="summary-card-val" id="kpi-return">—</div>
          <div class="summary-card-delta" id="kpi-return-pct">—</div>
        </div>
      </div>

      <!-- Performance chart -->
      <div class="panel" style="margin-bottom:20px;">
        <div class="panel-header">
          <span class="panel-title">Portfolio performance</span>
          <div class="chart-tabs" id="port-chart-tabs">
            <button class="chart-tab" data-months="1">1M</button>
            <button class="chart-tab" data-months="3">3M</button>
            <button class="chart-tab active" data-months="6">6M</button>
            <button class="chart-tab" data-months="12">1Y</button>
            <button class="chart-tab" data-months="36">3Y</button>
          </div>
        </div>
        <div class="panel-body" style="padding-bottom:12px;">
          <div id="port-chart"></div>
        </div>
      </div>

      <!-- Content grid: Holdings + Allocation -->
      <div class="content-grid content-grid-portfolio">

        <!-- Holdings panel -->
        <div>
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">Holdings</span>
              <button class="panel-action" id="add-holding-btn">+ Add holding</button>
            </div>
            <div class="panel-body">

              <!-- Column headers -->
              <div class="port-col-headers">
                <div></div>
                <div></div>
                <div>Name</div>
                <div>Allocation</div>
                <div class="right">%</div>
                <div class="right">Value</div>
                <div class="right">Day</div>
                <div class="right">Return</div>
                <div></div>
              </div>

              <!-- Rows injected by portfolio-ui.js -->
              <div id="holdings-rows"></div>

              <!-- Add row -->
              <button class="add-cat-btn" id="add-holding-btn-2">
                <svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Add holding
              </button>

            </div>
          </div>
        </div>

        <!-- Allocation panel -->
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">Asset allocation</span>
            </div>
            <div class="panel-body">
              <div id="allocation-chart"></div>
            </div>
          </div>

          <!-- Insight pill -->
          <div class="insight-pill-dash" id="port-insight">
            <div class="insight-icon">💡</div>
            <div class="insight-text"><strong>Kenso insight:</strong> Loading…</div>
          </div>
        </div>

      </div><!-- /content-grid -->

    </main>
  </div><!-- /app-main -->
</div><!-- /app-shell -->

<!-- ── Add / Edit holding modal ── -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="hold-modal" style="max-width:440px;">
    <div class="modal-title" id="modal-title">Add holding</div>

    <div style="display:grid;grid-template-columns:1fr 2fr;gap:12px;">
      <div class="form-field">
        <label class="form-label" for="modal-ticker">Ticker</label>
        <input class="form-input" id="modal-ticker" type="text" placeholder="VTI" maxlength="10" style="text-transform:uppercase;">
      </div>
      <div class="form-field">
        <label class="form-label" for="modal-name">Name</label>
        <input class="form-input" id="modal-name" type="text" placeholder="Vanguard Total Market ETF" maxlength="60">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-field">
        <label class="form-label" for="modal-value">Current value ($)</label>
        <input class="form-input" id="modal-value" type="number" min="0" step="0.01" placeholder="0">
      </div>
      <div class="form-field">
        <label class="form-label" for="modal-cost">Cost basis ($) <span style="color:var(--ink-4);font-weight:400;">optional</span></label>
        <input class="form-input" id="modal-cost" type="number" min="0" step="0.01" placeholder="0">
      </div>
    </div>

    <div class="form-field">
      <label class="form-label">Asset type</label>
      <div class="section-tabs" id="modal-type-tabs" style="flex-wrap:wrap;gap:6px;"></div>
    </div>

    <div class="form-field">
      <label class="form-label">Colour</label>
      <div class="color-swatches" id="modal-swatches"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-danger" id="modal-delete" style="display:none;">Delete</button>
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-save">Save holding</button>
    </div>
  </div>
</div>

<script type="module" src="portfolio-ui.js"></script>
</body>
</html>
